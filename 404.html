<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>404 - Page Not Found | Negi Physiotherapy Clinic</title>
		<meta name="theme-color" content="#1fa58f" />
		<meta name="robots" content="noindex, nofollow" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						fontFamily: {
							sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
						},
						colors: {
							medicalBlue: "#0b4f8a",
							medicalBlueLight: "#1d71ba",
							medicalGreen: "#1fa58f",
							medicalMint: "#e8fbf6",
							medicalIce: "#edf6ff",
						},
						boxShadow: {
							soft: "0 10px 30px rgba(15, 76, 129, 0.10)",
						},
					},
				},
			};
		</script>
		<style>
			:root {
				--theme-blue: #0b4f8a;
				--theme-blue-light: #1d71ba;
				--theme-green: #1fa58f;
				--theme-ice: #edf6ff;
				--theme-mint: #e8fbf6;
			}

			body {
				background:
					radial-gradient(circle at 10% 5%, rgba(11, 79, 138, 0.2), transparent 35%),
					radial-gradient(circle at 90% 18%, rgba(31, 165, 143, 0.2), transparent 36%),
					linear-gradient(180deg, #edf6ff 0%, #e8fbf6 55%, #edf6ff 100%),
					#edf6ff;
				color: #334155;
			}

			.theme-card {
				border: 1px solid rgba(148, 163, 184, 0.18);
				border-radius: 1rem;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.92));
				box-shadow: 0 10px 30px rgba(15, 76, 129, 0.1);
			}

			.theme-btn-primary {
				background: linear-gradient(135deg, var(--theme-blue), var(--theme-blue-light));
				box-shadow: 0 8px 20px rgba(11, 79, 138, 0.24);
			}

			.theme-btn-primary:hover {
				filter: brightness(1.05);
			}

			.theme-btn-outline {
				border: 1px solid rgba(11, 79, 138, 0.65);
				background: rgba(255, 255, 255, 0.9);
			}

			.theme-btn-outline:hover {
				background: linear-gradient(135deg, rgba(237, 246, 255, 0.95), rgba(232, 251, 246, 0.95));
			}
		</style>
	</head>
	<body class="min-h-screen bg-medicalIce text-slate-700 antialiased">
		<main class="mx-auto flex min-h-screen w-full max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
			<section class="theme-card w-full max-w-2xl p-7 text-center sm:p-10">
				<p class="mb-2 text-7xl font-extrabold leading-none tracking-tight text-medicalBlue sm:text-8xl">404</p>

				<h1 class="text-3xl font-extrabold text-slate-900 sm:text-4xl">Oops! Page not found</h1>
				<p class="mx-auto mt-3 max-w-xl text-sm leading-7 text-slate-600 sm:text-base">
					The page you requested is not available. Please return to the homepage to continue browsing Negi Physiotherapy Clinic.
				</p>

				<div class="mt-7 flex flex-col justify-center gap-3 sm:flex-row">
					<a href="/" class="theme-btn-primary inline-flex items-center justify-center rounded-full px-6 py-3 text-sm font-semibold text-white transition">
						Go to Homepage
					</a>
					<button
						type="button"
						onclick="window.history.back()"
						class="theme-btn-outline inline-flex items-center justify-center rounded-full px-6 py-3 text-sm font-semibold text-medicalBlue transition"
					>
						Go Back
					</button>
				</div>
			</section>
		</main>

		<script>
			document.getElementById('year').textContent = new Date().getFullYear();
			if (window.location.pathname !== '/404' && window.location.pathname !== '/404/') {
				window.history.replaceState({}, '', '/404');
			}
		</script>
	</body>
</html>
